services:
  postgres:
    image: postgres:16-alpine
    container_name: fiapx-auth-postgres
    environment:
      POSTGRES_DB: fiapx_auth
      POSTGRES_USER: fiapx
      POSTGRES_PASSWORD: fiapx123
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiapx -d fiapx_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  auth_postgres_data:
